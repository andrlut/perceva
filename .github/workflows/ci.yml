name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (app)
        run: pnpm --filter app typecheck

      - name: Typecheck (shared)
        run: pnpm --filter @rpgtasks/shared typecheck

      - name: Lint (app)
        run: pnpm --filter app lint

  # Staging only. This reaches the internal test APK, NOT the Play Store app —
  # that one listens on the `production` channel. Merging to main does not ship
  # to real users; promote deliberately via the "Promote to Production"
  # workflow (.github/workflows/promote-production.yml).
  publish-ota:
    name: Publish OTA Update (preview / internal APK)
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish update to preview channel
        working-directory: app
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://uneqnpyzevosznwkmvvo.supabase.co
          EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_sWLt4U0F5J4S-Se-6V7SXw_1LyQqysV
        run: eas update --branch preview --auto --non-interactive

      - name: Summary
        run: |
          {
            echo "### Published to \`preview\` (internal APK)"
            echo ""
            echo "This does **not** reach the Play Store app. To ship to real"
            echo "users, run the **Promote to Production** workflow."
          } >> "$GITHUB_STEP_SUMMARY"
